version = "3.8.6"
runner.dialect = scala3

maxColumn = 140

# ScalaDoc style — matches ProviderEvent.scala:
#   /**
#    * text
#    */
docstrings.style = Asterisk
docstrings.wrap = no
docstrings.oneline = unfold
docstrings.blankFirstLine = keep

# Indentation
indent.main = 2
indent.callSite = 2
indent.defnSite = 2
indent.extendSite = 2

newlines.source = keep

# binPack.defnSite intentionally NOT set to `never` — that setting forces
# `extends` onto its own line for multi-param case classes.

# Constructor parameters aligned to the opening paren when multi-line:
#   case class Foo(a: String,
#                  b: Int,
#                  c: Boolean) extends Bar
align.preset = none
align.openParenDefnSite = true
align.openParenCallSite = false

# No dangling closing parens
danglingParentheses.defnSite = false
danglingParentheses.callSite = false

# Keep `extends` on the same line as the closing paren when the parent list fits.
binPack.parentConstructors = Oneline

# Redundancy cleanup
rewrite.rules = [RedundantBraces, RedundantParens, SortModifiers]
rewrite.redundantBraces.stringInterpolation = true

# Trailing commas
rewrite.trailingCommas.style = keep

# Import handling
rewrite.scala3.convertToNewSyntax = false
rewrite.scala3.removeOptionalBraces = no

project.git = true
project.excludePaths = [
  "glob:**/target/**"
]
